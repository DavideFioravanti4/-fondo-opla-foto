<!doctype html>
<html lang="it">
<head>

  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Upload foto / video</title>

  <style>
    :root{
      --brand:#0b84f3;
      --warn:#b7791f;
      --bg:#eef4ff;
    }

    html,body{
      margin:0;
      padding:0;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg) url("sfondo.png") no-repeat center center fixed;
      background-size:cover;
      color:#111;
    }

    header{
      padding:14px;
      background:linear-gradient(90deg, var(--brand), #6bb6ff);
      color:#fff;
      text-align:center;
      font-size:19px;
      font-weight:700;
    }

    main{
      width:260px;
      max-width:92%;
      margin:12px auto;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:8px 10px 14px;
      box-shadow:0 2px 12px rgba(0,0,0,.10);
      text-align:center;
    }

    .logo-img{
      display:block;
      margin:0 auto 18px;
      width:85%;
      max-width:420px;
      height:auto;
    }

    .intro{
      margin:0 0 10px;
      color:#444;
      font-size:15px;
      font-weight:600;
    }

    .row-btn{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      margin-top:6px;
    }

    button{
      width:100%;
      max-width:220px;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .btn-photo{ background:var(--brand); }
    .btn-video{ background:var(--warn); }

    .status{
      margin-top:8px;
      min-height:28px;
    }

    .pill{
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
      display:inline-block;
    }

    .ok{ background:#e8f7f1; color:#0c6b4e; border:1px solid #bfead9; }
    .warn{ background:#fff7e6; color:#8a6100; border:1px solid #fde1a3; }
    .err{ background:#fde8e8; color:#7e1f1f; border:1px solid #f3b4b4; }

    .preview{
      margin-top:10px;
      display:flex;
      justify-content:center;
    }

    .preview img, .preview video{
      max-width:100%;
      border-radius:10px;
      border:1px solid #e5e7eb;
    }

    .footer{
      margin-top:10px;
      font-size:11px;
      color:#555;
      text-align:center;
    }
  </style>
</head>

<body>

<header>Upload foto / video</header>

<main>

  <img src="LogoUltimaVersione.png" class="logo-img"/>

  <div class="intro">Fondo Oplà • Pagina caricata</div>

  <div class="row-btn">
    <button id="btnPhoto" class="btn-photo">📸 Aggiungi foto</button>
    <button id="btnVideo" class="btn-video">🎥 Aggiungi video</button>
  </div>

  <input id="inputPhoto" type="file" accept="image/*" style="display:none"/>
  <input id="inputVideo" type="file" accept="video/*" style="display:none"/>

  <div id="status" class="status"></div>
  <div id="preview" class="preview"></div>

  <div class="footer">v7.0</div>

</main>

<script>
/* CONFIG */
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/eaecce70bbda403caa744bf8a95ddece/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4xUPro1xqrxgwZVmuyha10sbdZaPj2q7otQs2ReQpWk",

  MAX_W: 1600,        // ✅ ridimensionamento sicuro (foto originali fino a 12–20MB)
  MAX_H: 1600,
  TARGET_QUALITY: 0.75,

  MAX_VIDEO_MB:15,
  MAX_VIDEO_SECONDS:20,

  AUTO_REDIRECT_MS:900
};

const $ = id => document.getElementById(id);
const qs = Object.fromEntries(new URLSearchParams(location.search).entries());

function setStatus(msg,type='ok'){
  const c = type==='ok'?'pill ok':type==='err'?'pill err':'pill warn';
  $('status').innerHTML = `<span class="${c}">${msg}</span>`;
}

function showPreview(file){
  const url = URL.createObjectURL(file);
  const p = $('preview');
  p.innerHTML = '';

  if(file.type.startsWith("image/")){
    const img = new Image();
    img.onload = () => URL.revokeObjectURL(url);
    img.src = url;
    p.appendChild(img);
  } else {
    const vid = document.createElement("video");
    vid.controls = true;
    vid.src = url;
    vid.onloadeddata = () => URL.revokeObjectURL(url);
    p.appendChild(vid);
  }
}

/* ✅ compressione foto compatibile con TUTTI i telefoni */
async function compressImage(file){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {

      let w = img.width;
      let h = img.height;

      const scale = Math.min(CONFIG.MAX_W / w, CONFIG.MAX_H / h, 1);
      w *= scale;
      h *= scale;

      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);

      canvas.toBlob(
        blob => resolve(new File([blob], "photoSlim.jpg", {type:"image/jpeg"})),
        "image/jpeg",
        CONFIG.TARGET_QUALITY
      );
    };

    img.src = URL.createObjectURL(file);
  });
}

/* ✅ Upload stabile, 1 file + base64 */
async function performUpload({fileOriginal,fileSlim,videoFile}){

  const fd = new FormData();
  const uploadCode = crypto?.randomUUID ? crypto.randomUUID() : Date.now();

  const mainFile = fileOriginal || videoFile || fileSlim;
  fd.append("file", mainFile, mainFile.name);

  async function toBase64(f){
    if(!f) return null;
    const buf = await f.arrayBuffer();
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
  }

  fd.append("metadata", JSON.stringify({
    uploadCode,
    proposalId: qs.proposalId || null,
    photoOriginal_b64: fileOriginal && fileOriginal !== mainFile ? await toBase64(fileOriginal) : null,
    photoSlim_b64: fileSlim && fileSlim !== mainFile ? await toBase64(fileSlim) : null
  }));

  $('btnPhoto').disabled = true;
  $('btnVideo').disabled = true;
  setStatus("Caricamento…","warn");

  try{
    const res = await fetch(CONFIG.FLOW_URL,{method:"POST",body:fd});
    if(!res.ok) throw new Error("HTTP "+res.status);

    setStatus("File caricato. Reindirizzo…","ok");

    if(qs.returnUrl){
      const key="r2eaf878955164549a839a54cf37c9ea7";
      const sep = qs.returnUrl.includes("?") ? "&" : "?";
      setTimeout(()=>location.href =
        `${qs.returnUrl}${sep}${key}=${uploadCode}`,
      CONFIG.AUTO_REDIRECT_MS);
    }
  }
  catch(err){
    setStatus("Errore: "+err.message,"err");
    $('btnPhoto').disabled=false;
    $('btnVideo').disabled=false;
  }
}

/* ✅ FOTO */
async function handlePhoto(file){
  if(!file) return;

  showPreview(file);
  setStatus("Foto ricevuta, preparo…","warn");

  const slim = await compressImage(file);

  await performUpload({
    fileOriginal:file,
    fileSlim:slim,
    videoFile:null
  });
}

/* ✅ VIDEO */
function checkVideoDuration(file){
  return new Promise(resolve=>{
    const v=document.createElement("video");
    v.preload="metadata";
    v.src=URL.createObjectURL(file);
    v.onloadedmetadata=()=>{
      URL.revokeObjectURL(v.src);
      resolve(v.duration);
    };
  });
}

async function handleVideo(file){
  if(!file) return;

  if(file.size > CONFIG.MAX_VIDEO_MB * 1024*1024)
    return setStatus(`Video troppo grande (> ${CONFIG.MAX_VIDEO_MB}MB)`,"err");

  showPreview(file);
  setStatus("Analizzo durata video…","warn");

  const duration = await checkVideoDuration(file);

  if(duration > CONFIG.MAX_VIDEO_SECONDS)
    return setStatus(`Video troppo lungo (max ${CONFIG.MAX_VIDEO_SECONDS}s)`,"err");

  setStatus("Video valido, invio…","ok");

  await performUpload({
    fileOriginal:null,
    fileSlim:null,
    videoFile:file
  });
}

/* EVENTI */
$('btnPhoto').addEventListener('click',()=>$('inputPhoto').click());
$('btnVideo').addEventListener('click',()=>$('inputVideo').click());

$('inputPhoto').addEventListener('change',e=>{
  handlePhoto(e.target.files?.[0]);
  e.target.value='';
});

$('inputVideo').addEventListener('change',e=>{
  handleVideo(e.target.files?.[0]);
});
</script>

</body>
</html>
