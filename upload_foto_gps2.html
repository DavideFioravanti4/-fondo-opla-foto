<!doctype html>
<html lang="it">
<head>

  <!-- v8.0 – Single Button, Foto OK, Video Convertiti Veloci -->
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <title>Upload foto / video</title>

  <!-- ✅ EXIF per GPS Foto -->
  <script src="https://unpkg.com/exifr@7.1.3/dist/full.umd.min.js"></script>

  <!-- ✅ FFMPEG WASM per conversione video veloce -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.2/dist/ffmpeg.min.js"></script>

  <style>
    :root{
      --brand:#0b84f3;
      --warn:#b7791f;
      --bg:#eef4ff;
    }

    html,body{
      margin:0;
      padding:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg) url("sfondo.png") no-repeat center center fixed;
      background-size:cover;
      color:#111;
    }

    header{
      padding:14px;
      background:linear-gradient(90deg,var(--brand),#6bb6ff);
      color:#fff;
      text-align:center;
      font-size:19px;
      font-weight:700;
    }

    main{
      width:260px;
      max-width:92%;
      margin:12px auto;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:8px 10px 14px;
      text-align:center;
      box-shadow:0 2px 12px rgba(0,0,0,.10);
    }

    .logo-img{
      display:block;
      margin:0 auto 12px;
      width:250px;
      height:auto;
    }

    .intro{
      margin:0 0 10px;
      color:#444;
      font-size:15px;
      font-weight:600;
    }

    .row-btn{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
      margin-top:6px;
    }

    button{
      width:100%;
      max-width:220px;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
      color:#fff;
      background:var(--brand);
    }

    .status{ margin-top:8px; min-height:28px; }

    .pill{
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
      display:inline-block;
    }
    .ok{ background:#e8f7f1;color:#0c6b4e; }
    .warn{ background:#fff7e6;color:#8a6100; }
    .err{ background:#fde8e8;color:#7e1f1f; }

    .preview{
      margin-top:10px;
      display:flex;
      justify-content:center;
    }
    .preview img,.preview video{
      max-width:100%;
      border-radius:10px;
      border:1px solid #e5e7eb;
    }

    .footer{
      margin-top:10px;
      font-size:11px;
      text-align:center;
      color:#555;
    }

  </style>

</head>
<body>

<header>Upload foto / video</header>

<main>

  <!-- ✅ Logo -->
  <img src="LogoUltimaVersione.png" class="logo-img"/>

  <div class="intro">Fondo Oplà • Pagina caricata</div>

  <div class="row-btn">
    <button id="btnFile">📤 Aggiungi foto/video</button>
  </div>

  <input id="inputFile" type="file" accept="image/*,video/*" style="display:none"/>

  <div id="status" class="status"></div>
  <div id="preview" class="preview"></div>

  <div class="footer">v8.0 ONE BUTTON</div>

</main>

<script>
/* ✅ CONFIG */
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/eaecce70bbda403caa744bf8a95ddece/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4xUPro1xqrxgwZVmuyha10sbdZaPj2q7otQs2ReQpWk",
  MAX_VIDEO_MB:60
};

const $ = id => document.getElementById(id);

/* ✅ STATUS */
function setStatus(msg,type='ok'){
  const c = type==='ok'?'pill ok':type==='warn'?'pill warn':'pill err';
  $('status').innerHTML = `<span class="${c}">${msg}</span>`;
}

/* ✅ PREVIEW */
function showPreview(file){
  const url = URL.createObjectURL(file);

  if(file.type.startsWith("image/")){
    $('preview').innerHTML/* ✅ UPLOAD */
async function uploadFile(file){
  const fd = new FormData();
  fd.append("file", file, file.name);

  await fetch(CONFIG.FLOW_URL,{method:"POST",body:fd});
}

/* ✅ FOTO */
async function processPhoto(file){
  showPreview(file);
  setStatus("Caricamento foto…","warn");
  await uploadFile(file);
  setStatus("✅ Foto caricata","ok");
}

/* ✅ VIDEO – conversione veloce */
async function processVideo(file){
  if(file.size > CONFIG.MAX_VIDEO_MB*1024*1024)
    return setStatus("Video troppo grande","err");

  showPreview(file);
  setStatus("Conversione video…","warn");

  const {createFFmpeg, fetchFile} = FFmpeg;
  const ffmpeg = createFFmpeg({log:false});
  await ffmpeg.load();

  ffmpeg.FS("writeFile","input.mp4", await fetchFile(file));

  await ffmpeg.run(
    "-i","input.mp4",
    "-t","10",
    "-vf","scale=640:-1",
    "-vcodec","libx264",
    "-preset","ultrafast",
    "-crf","32",
    "-acodec","aac",
    "-b:a","48k",
    "output.mp4"
  );

  const data = ffmpeg.FS("readFile","output.mp4");
  const finalFile = new File([data.buffer],"video.mp4",{type:"video/mp4"});

  setStatus("Caricamento video…","warn");
  await uploadFile(finalFile);

  setStatus("✅ Video caricato","ok");
}

/* ✅ HANDLER UNICO */
async function handleFile(file){
  if(!file) return;

  if(file.type.startsWith("image/")) return processPhoto(file);
  if(file.type.startsWith("video/")) return processVideo(file);

  setStatus("Formato non supportato","err");
}

/* ✅ EVENTI */
$('btnFile').addEventListener('click',()=> $('inputFile').click());
$('inputFile').addEventListener('change', e=>{
  handleFile(e.target.files[0]);
  e.target.value='';
});
</script>

</body>
</html>
