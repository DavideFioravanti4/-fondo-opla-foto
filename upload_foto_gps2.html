<!doctype html>
<html lang="it">
<head>

  <!-- v4.4 build 07 - forza rigenerazione GitHub Pages -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Upload foto / video (GPS opzionale)</title>
  <meta name="color-scheme" content="light dark"/>

  <!-- EXIF -->
  https://unpkg.com/exifr@7.1.3/dist/full.umd.min.js>

  <style>
    :root{
      --brand:#0b84f3;
      --ok:#1aa36f;
      --warn:#b7791f;
      --err:#d64545;
      --bg:#f7fafc;
    }

    html,body{
      margin:0;
      padding:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:#e8f1ff url("sfondo.png") no-repeat center center fixed;
      background-size:cover;
    }

    header{
      padding:16px;
      background:linear-gradient(90deg, var(--brand), #6bb6ff);
      color:#fff;
      display:flex;
      align-items:center;
      gap:12px;
    }

    header img{
      height:40px;
      width:auto;
    }

    header h1{
      margin:0;
      font-size:20px;
      font-weight:700;
    }

    main{
      max-width:680px;
      margin:40px auto 48px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:24px;
      box-shadow:0 4px 20px rgba(0,0,0,.08);
      text-align:center;
    }

    .row-btn{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:20px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:14px 22px;
      font-weight:700;
      cursor:pointer;
      font-size:16px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .btn-photo{ background:#0b84f3; color:#fff; }
    .btn-video{ background:#b7791f; color:#fff; }

    button[disabled]{ opacity:.6; cursor:not-allowed; }

    .status{
      margin-top:20px;
      text-align:center;
      min-height:40px;
    }

    .pill{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      font-size:14px;
      font-weight:600;
    }

    .ok{ background:#e8f7f1; color:#0c6b4e; border:1px solid #bfead9; }
    .warn{ background:#fff7e6; color:#8a6100; border:1px solid #fde1a3; }
    .err{ background:#fde8e8; color:#7e1f1f; border:1px solid #f3b4b4; }

    .preview{
      margin-top:16px;
      display:flex;
      justify-content:center;
    }

    .preview img, .preview video{
      max-width:100%;
      border-radius:12px;
      border:1px solid #e5e7eb;
    }

    .footer{
      text-align:center;
      color:#777;
      font-size:12px;
      margin-top:24px;
    }
  </style>

</head>

<body>

<header>
  <img src="sfondo.png" alt="Logo Fondo Oplà">
  <h1>Upload foto / video (GPS opzionale)</h1>
</header>

<main>
  <h3>Fondo Oplà • Pagina caricata (v4.4)</h3>

  <div class="row-btn">
    <button id="btnPhoto" class="btn-photo">📸 Aggiungi foto</button>
    <button id="btnVideo" class="btn-video">🎥 Aggiungi video</button>
  </div>

  <!-- Picker -->
  <input id="inputPhoto" type="file" accept="image/*" style="display:none"/>
  <input id="inputVideo" type="file" accept="video/*" style="display:none"/>

  <div id="status"  class="status"></div>
  <div id="preview" class="preview"></div>

  <div class="footer">v4.4 • foto+video • stile originale ripristinato • UploadCode + redirect</div>
</main>

<script>
/* CONFIG */
const CONFIG = {
  FLOW_URL: "https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/9fcb17d91fb04381a99b73253c58be13/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=jKLvegzU4_lKaF9gI_bmCIZeiSu2Kl-itRJ7_ZjVFds",
  TARGET_MAX_BYTES: 1*1024*1024,
  TARGET_MAX_DIM: 1600,
  MAX_VIDEO_MB: 15,
  AUTO_REDIRECT_MS: 800
};

const $ = id => document.getElementById(id);
const qs = Object.fromEntries(new URLSearchParams(location.search).entries());

/* UI */
function setStatus(msg,type='ok'){
  const cls = type==='ok'?'pill ok':type==='err'?'pill err':'pill warn';
  $('status').innerHTML = `<span class="${cls}">${msg}</span>`;
}
function clearStatus(){ $('status').innerHTML=''; }
function disableUI(b){
  $('btnPhoto').disabled=b;
  $('btnVideo').disabled=b;
}

/* ANTEPRIMA */
function showPreview(file){
  const url = URL.createObjectURL(file);
  const p = $('preview');
  p.innerHTML='';
  if(file.type.startsWith("image/")){
    const img = new Image();
    img.onload = ()=> URL.revokeObjectURL(url);
    img.src = url;
    p.appendChild(img);
  } else {
    const vid = document.createElement("video");
    vid.src=url;
    vid.controls = true;
    vid.onloadeddata = ()=> URL.revokeObjectURL(url);
    p.appendChild(vid);
  }
}

/* FOTO - COMPRESSIONE */
async function downscaleToJPEG(file){
  try{
    const bmp = await createImageBitmap(file);
    const scale = Math.min(1, CONFIG.TARGET_MAX_DIM / Math.max(bmp.width,bmp.height));
    const w = Math.round(bmp.width*scale);
    const h = Math.round(bmp.height*scale);
    const canvas = document.createElement("canvas");
    canvas.width=w; canvas.height=h;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(bmp,0,0,w,h);
    let q=0.8, blob;
    blob = await new Promise(r=>canvas.toBlob(r,"image/jpeg",q));
    while(blob.size > CONFIG.TARGET_MAX_BYTES && q > 0.4){
      q -= 0.1;
      blob = await new Promise(r=>canvas.toBlob(r,"image/jpeg",q));
    }
    return new File([blob],"photo.jpg",{type:"image/jpeg"});
  }catch(e){
    return file;
  }
}

/* EXIF GPS */
async function extractGps(file){
  try{
    const gps = await exifr.gps(file);
    if(gps?.latitude && gps?.longitude) return gps;
  }catch(e){}
  return null;
}

/* UPLOAD */
async function performUpload(file, position, noGps){
  const fd = new FormData();
  fd.append("file",file,file.name);
  const uploadCode = crypto?.randomUUID ? crypto.randomUUID() : Date.now();
  const metadata = {
    uploadCode,
    proposalId: qs.proposalId || null,
    position,
    notes: noGps ? "gps non disponibile" : undefined
  };
  fd.append("metadata",JSON.stringify(metadata));
  disableUI(true);
  setStatus("Caricamento…","warn");
  try{
    const res = await fetch(CONFIG.FLOW_URL,{method:"POST",body:fd});
    if(!res.ok) throw new Error("HTTP "+res.status);
    setStatus("File caricato. Reindirizzamento…","ok");
    if(qs.returnUrl){
      const FIELD="r2eaf878955164549a839a54cf37c9ea7";
      const sep = qs.returnUrl.includes("?")?"&":"?";
      setTimeout(()=>{
        location.href = `${qs.returnUrl}${sep}${FIELD}=${uploadCode}`;
      },CONFIG.AUTO_REDIRECT_MS);
    } else {
      disableUI(false);
    }
  }catch(err){
    setStatus("Errore: "+err.message,"err");
    disableUI(false);
  }
}

/* VIDEO */
async function handleVideo(file){
  if(!file) return;
  if(file.size > CONFIG.MAX_VIDEO_MB*1024*1024){
    setStatus(`Video troppo grande (>${CONFIG.MAX_VIDEO_MB}MB)`,"err");
    return;
  }
  showPreview(file);
  await performUpload(file,null,false);
}

/* FOTO */
async function handlePhoto(file){
  if(!file) return;
  showPreview(file);
  setStatus("Verifico GPS…","warn");
  const gps = await extractGps(file);
  const slim = await downscaleToJPEG(file);
  await performUpload(slim,gps,!gps);
}

/* EVENTI */
$('btnPhoto').addEventListener('click',()=> $('inputPhoto').click());
$('btnVideo').addEventListener('click',()=> $('inputVideo').click());

$('inputPhoto').addEventListener('change', async e=>{
  await handlePhoto(e.target.files?.[0]);
  e.target.value='';
});

$('inputVideo').addEventListener('change', async e=>{
  await handleVideo(e.target.files?.[0]);
  e.target.value='';
});
</script>

</body>
</html>
