<!doctype html>
<html lang="it">
<head>

  <!-- v10 – Single Button • Foto OK • Video ULTRAFAST • Nessuna pagina bianca -->
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <title>Upload foto / video</title>

  <!-- ✅ EXIF CORRETTO -->
  <script src="https://unpkg.com/exifr@7.1.md.min.js

  <!-- ✅ FFMPEG CORRETTO (QUESTA VOLTA VERO SCRIPT) -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.2/dist/ffmpegtyle>
    :root{
      --brand:#0b84f3;
      --bg:#eef4ff;
    }

    html,body{
      margin:0;
      padding:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg) url("sfondo.png") no-repeat center center fixed;
      background-size:cover;
    }

    header{
      padding:14px;
      background:#0b84f3;
      color:#fff;
      text-align:center;
      font-size:19px;
      font-weight:700;
    }

    main{
      width:260px;
      margin:18px auto;
      background:#fff;
      border-radius:12px;
      padding:12px;
      text-align:center;
      box-shadow:0 2px 12px rgba(0,0,0,.15);
    }

    .logo-img{
      width:220px;
      margin-bottom:12px;
    }

    button{
      width:100%;
      padding:12px;
      background:#0b84f3;
      border:none;
      color:#fff;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      font-size:16px;
    }

    .preview img, .preview video{
      max-width:100%;
      margin-top:12px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .status{
      margin-top:10px;
      font-size:14px;
      min-height:20px;
    }

    .ok{ color:#0c6b4e; }
    .warn{ color:#8a6100; }
    .err{ color:#a71d1d; }

  </style>

</head>

<body>

<header>Upload foto / video</header>

<main>

  <img src="LogoUltimaVersioneutton id="btnFile">📤 Aggiungi foto/video</button>

  <input id="inputFile" type="file" accept="image/*,video/*" style="display:none"/>

  <div id="status" class="status"></div>
  <div id="preview" class="preview"></div>

</main>

<script>
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/eaecce70bbda403caa744bf8a95ddece/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4xUPro1xqrxgwZVmuyha10sbdZaPj2q7otQs2ReQpWk",
  MAX_VIDEO_MB:60
};

const $ = id => document.getElementById(id);

function setStatus(msg, cls="ok"){
  $("status").innerHTML = `<span class="${cls}">${msg}</span>`;
}

function showPreview(file){
  const url = URL.createObjectURL(file);
  $("preview").innerHTML = file.type.startsWith("image/")
    ? `${url}`
    : `${url}</video>`;
}

/* ✅ FOTO */
async function processPhoto(file){
  showPreview(file);
  setStatus("Caricamento foto…","warn");

  const fd = new FormData();
  fd.append("file", file, file.name);

  await fetch(CONFIG.FLOW_URL,{method:"POST", body:fd});
  setStatus("✅ Foto caricata","ok");
}

/* ✅ VIDEO – conversione ULTRAVELOCE */
async function processVideo(file){
  if(file.size > CONFIG.MAX_VIDEO_MB*1024*1024)
    return setStatus("Video troppo grande","err");

  showPreview(file);
  setStatus("Conversione video…","warn");

  const { createFFmpeg, fetchFile } = FFmpeg;
  const ffmpeg = createFFmpeg({log:false});
  await ffmpeg.load();

  ffmpeg.FS("writeFile","input.mp4", await fetchFile(file));

  await ffmpeg.run(
    "-i","input.mp4",
    "-t","10",
    "-vf","scale=480:-1",
    "-vcodec","libx264",
    "-preset","ultrafast",
    "-crf","35",
    "-acodec","aac",
    "-b:a","32k",
    "output.mp4"
  );

  const data = ffmpeg.FS("readFile","output.mp4");
  const finalFile = new File([data.buffer], "video.mp4", {type:"video/mp4"});

  const fd = new FormData();
  fd.append("file", finalFile, finalFile.name);

  setStatus("Caricamento…","warn");
  await fetch(CONFIG.FLOW_URL,{method:"POST", body:fd});
  setStatus("✅ Video caricato","ok");
}

/* ✅ DECISIONE */
async function handleFile(file){
  if(file.type.startsWith("image/")) return processPhoto(file);
  if(file.type.startsWith("video/")) return processVideo(file);
  setStatus("Formato non supportato","err");
}

/* ✅ EVENTI */
$("btnFile").addEventListener("click", ()=> $("inputFile").click());
$("inputFile").addEventListener("change", e=>{
  handleFile(e.target.files[0]);
  e.target.value='';
});

</script>

</body>
</html>
