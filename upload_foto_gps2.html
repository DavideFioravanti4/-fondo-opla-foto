<!DOCTYPE html>
<html lang="UTF-8" /><html lang="it">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fondo Oplà – Upload Foto</title>

    <style>
        /* ------------------------------
           FONT & RESET
        ------------------------------ */
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: url('sfondo.png') center/cover no-repeat fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            min-height: 100vh;
        }

        /* ------------------------------
           OVERLAY CARD
        ------------------------------ */
        .card {
            width: 92%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.90);
            border-radius: 22px;
            padding: 30px;
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(5px);
            text-align: center;
        }

        /* ------------------------------
           LOGO
        ------------------------------ */
        .logo img {
            width: 70%;
            max-width: 260px;
            margin-bottom: 10px;
        }

        /* ------------------------------
           TITOLO
        ------------------------------ */
        h1 {
            font-size: 1.9rem;
            color: #e55353;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            color: #444;
            margin-top: 0;
            margin-bottom: 28px;
        }

        /* ------------------------------
           UPLOAD BOX
        ------------------------------ */
        .upload-area {
            border: 2px dashed #f2b700;
            background: #fffdf4;
            border-radius: 16px;
            padding: 30px 20px;
            cursor: pointer;
            transition: 0.25s;
        }

        .upload-area:hover {
            background: #fff7d4;
        }

        .upload-area input {
            display: none;
        }

        .upload-area span {
            display: block;
            margin-top: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
        }

        /* ------------------------------
           SUBMIT BUTTON
        ------------------------------ */
        .btn {
            width: 100%;
            margin-top: 28px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #26c3a8;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn:hover {
            background: #1da18c;
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- LOGO -->
        <div class="logo">
            <img src="LogoUltimaVersione.png" alt="Logo Fondo Oplà">
        </div>

        <!-- TITOLO E TESTO -->
        <h1>Carica la tua foto</h1>
        <p>Scatta o seleziona un’immagine per completare la tua proposta.</p>

        <!-- UPLOAD BOX -->
        <label class="upload-area">
            <input type="file" accept="image/*" capture="environment" id="fotoInput">
            📸
            <span>Tocca qui per caricare la foto</span>
        </label>

        <!-- BOTTONE -->
        <button class="btn" onclick="inviaFoto()">Invia Immagine</button>
    </div>

    <script>
        function inviaFoto() {
            const fileInput = document.getElementById('fotoInput');

            if (!fileInput.files.length) {
                alert("Per favore seleziona o scatta una foto prima di procedere.");
                return;
            }

            // ✅ Questa è la logica base che avevi.
            //    Il redirect continuerà a funzionare con il tuo returnUrl.
            const urlParams = new URLSearchParams(window.location.search);
            const returnUrl = urlParams.get('returnUrl');

            alert("Foto caricata correttamente!");

            if (returnUrl) window.location.href = returnUrl;
        }
    </script>

</body>
</html>
