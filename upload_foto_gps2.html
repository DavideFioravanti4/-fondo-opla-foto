<!doctype html>
<html lang="it">
<head>

  <!-- v6.2 – video conversione, compressione, limite MB (basato su v6.0) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Upload foto / video</title>
  <meta name="color-scheme" content="light dark"/>

  <!-- ✅ EXIF CORRETTO -->
  <script src="https://unpkg.com/exifr@7.1.md.min.js

  <!-- ✅ FFMPEG CORRETTO (0.12.2) -->
  <script src="https://unpkg.com/@ffmpeg/ffmpegffmpeg.min.js</script>

  <style>
    :root{
      --brand:#0b84f3;
      --warn:#b7791f;
      --bg:#eef4ff;
    }

    html,body{
      margin:0;
      padding:0;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg) url("sfondo.png") no-repeat center center fixed;
      background-size:cover;
      color:#111;
    }

    header{
      padding:14px;
      background:linear-gradient(90deg, var(--brand), #6bb6ff);
      color:#fff;
      text-align:center;
      font-size:19px;
      font-weight:700;
    }

    /* ✅ BOX COMPATTISSIMO */
    main{
      width:260px;
      max-width:92%;
      margin:12px auto;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:6px 10px 12px;
      box-shadow:0 2px 12px rgba(0,0,0,.10);
      text-align:center;
    }

    /* ✅ LOGO ENORME */
    .logo{
      display:block;
      margin:-10px auto 10px;
      width:330px;
      height:auto;
    }

    .intro{
      margin:0 0 10px;
      color:#444;
      font-size:15px;
      font-weight:600;
    }

    .row-btn{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      margin-top:6px;
    }

    button{
      width:100%;
      max-width:220px;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .btn-photo{ background:var(--brand); }
    .btn-video{ background:var(--warn); }

    .status{
      margin-top:8px;
      min-height:28px;
    }

    .pill{
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
      display:inline-block;
    }

    .ok{ background:#e8f7f1; color:#0c6b4e; border:1px solid #bfead9; }
    .warn{ background:#fff7e6; color:#8a6100; border:1px solid #fde1a3; }
    .err{ background:#fde8e8; color:#7e1f1f; border:1px solid #f3b4b4; }

    .preview{
      margin-top:10px;
      display:flex;
      justify-content:center;
    }

    .preview video, .preview img{
      max-width:100%;
      border-radius:10px;
      border:1px solid #e5e7eb;
    }

    .footer{
      margin-top:10px;
      font-size:11px;
      color:#555;
      text-align:center;
    }
  </style>
</head>

<body>

<header>Upload foto / video</header>

<main>

  <div class="logo">LogoUltimaVersione.png</div>

  <div class="intro">Fondo Oplà • Pagina caricata</div>

  <div class="row-btn">
    <button id="btnPhoto" class="btn-photo">📸 Aggiungi foto</button>
    <button id="btnVideo" class="btn-video">🎥 Aggiungi video</button>
  </div>

  <input id="inputPhoto" type="file" accept="image/*" style="display:none"/>
  <input id="inputVideo" type="file" accept="video/*" style="display:none"/>

  <div id="status" class="status"></div>
  <div id="preview" class="preview"></div>

  <!-- ✅ VERSIONE REALE -->
  <div class="footer" id="version"></div>

</main>

<script>
/* ✅ VERSIONE REALE */
const VERSION = "v6.2";
document.getElementById("version").textContent = VERSION;

/* CONFIG */
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/eaecce70bbda403caa744bf8a95ddece/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4xUPro1xqrxgwZVmuyha10sbdZaPj2q7otQs2ReQpWk",
  TARGET_MAX_BYTES:1*1024*1024,
  TARGET_MAX_DIM:1600,
  MAX_VIDEO_MB:20,
  AUTO_REDIRECT_MS:900
};

const MAX_VIDEO_SECONDS = 10;      // ✅ Come tua v6.0 originale
const TARGET_VIDEO_BITRATE = "1000k";

const $ = id => document.getElementById(id);

/* STATUS */
function setStatus(msg,type='ok'){
  const c = type==='ok'?'pill ok':type==='err'?'pill err':'pill warn';
  $('status').innerHTML = `<span class="${c}">${msg}</span>`;
}
function disableUI(v){
  $('btnPhoto').disabled=v;
  $('btnVideo').disabled=v;
}

/* PREVIEW */
function showPreview(file){
  const url = URL.createObjectURL(file);
  const p = $('preview');
  p.innerHTML='';
  if(file.type.startsWith('image/')){
    const img=new Image();
    img.src=url;
    p.appendChild(img);
  } else {
    const vid=document.createElement('video');
    vid.controls=true;
    vid.src=url;
    p.appendChild(vid);
  }
}

/* FOTO identica alla tua */
async function handlePhoto(file){
  if(!file) return;
  showPreview(file);
  setStatus("Verifico GPS…","warn");
  const gps = await extractGps(file);
  const slim = await downscaleToJPEG(file);
  await performUpload(slim,gps,!gps);
}

/* GPS FOTO */
async function extractGps(file){
  try{
    const gps=await exifr.gps(file);
    if(gps?.latitude && gps?.longitude) return gps;
  }catch{}
  return null;
}

/* COMPRESSIONE FOTO */
async function downscaleToJPEG(file){
  try{
    const bmp=await createImageBitmap(file);
    const scale=Math.min(1,CONFIG.TARGET_MAX_DIM/Math.max(bmp.width,bmp.height));
    const w=Math.round(bmp.width*scale);
    const h=Math.round(bmp.height*scale);

    const canvas=document.createElement("canvas");
    canvas.width=w;
    canvas.height=h;
    canvas.getContext("2d").drawImage(bmp,0,0,w,h);

    let q=0.8;
    let blob=await new Promise(r=>canvas.toBlob(r,"image/jpeg",q));
    while(blob.size>CONFIG.TARGET_MAX_BYTES && q>0.4){
      q-=0.1;
      blob=await new Promise(r=>canvas.toBlob(r,"image/jpeg",q));
    }
    return new File([blob],"photo.jpg",{type:"image/jpeg"});
  }catch{
    return file;
  }
}

/* ✅ VIDEO: conversione vera H.264 + compressione + trim */
async function handleVideo(file){
  if(!file) return;

  disableUI(true);

  if(file.size > CONFIG.MAX_VIDEO_MB*1024*1024){
    setStatus(`Video troppo grande (> ${CONFIG.MAX_VIDEO_MB}MB)`,"err");
    disableUI(false);
    return;
  }

  setStatus("Elaboro video… (conversione H.264)","warn");

  const {createFFmpeg, fetchFile} = FFmpeg;
  const ffmpeg = createFFmpeg({log:false});
  await ffmpeg.load();

  ffmpeg.FS("writeFile","input.mp4", await fetchFile(file));

  await ffmpeg.run(
    "-i","input.mp4",
    "-t", MAX_VIDEO_SECONDS.toString(),
    "-vcodec","libx264",
    "-preset","veryfast",
    "-b:v",TARGET_VIDEO_BITRATE,
    "-acodec","aac",
    "-b:a","96k",
    "output.mp4"
  );

  const data = ffmpeg.FS("readFile","output.mp4");
  const finalFile = new File([data.buffer],"video.mp4",{type:"video/mp4"});

  showPreview(finalFile);
  setStatus("Caricamento video…","warn");
  await performUpload(finalFile,null,false);

  disableUI(false);
}

/* UPLOAD invariato */
async function performUpload(file,position,noGps){
  const fd=new FormData();
  fd.append("file",file,file.name);

  const uploadCode = crypto?.randomUUID ? crypto.randomUUID() : Date.now();

  fd.append("metadata",JSON.stringify({
    uploadCode,
    position,
    notes:noGps?"gps non disponibile":undefined
  }));

  try{
    const res=await fetch(CONFIG.FLOW_URL,{method:"POST",body:fd});
    if(!res.ok) throw new Error("HTTP "+res.status);
    setStatus("✅ File caricato","ok");
  }catch(err){
    setStatus("Errore: "+err.message,"err");
  }
}

/* EVENTI */
$('btnPhoto').addEventListener('click',()=> $('inputPhoto').click());
$('btnVideo').addEventListener('click',()=> $('inputVideo').click());

$('inputPhoto').addEventListener('change',e=>{
  handlePhoto(e.target.files?.[0]);
  e.target.value='';
});

$('inputVideo').addEventListener('change',e=>{
  handleVideo(e.target.files?.[0]);
  e.target.value='';
});

</script>

</body>
</html>
