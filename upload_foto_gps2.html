<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Upload foto • GPS opzionale</title>
<meta name="color-scheme" content="light dark"/>

<!-- ✅ Lettura EXIF (GPS dalla foto se disponibile) -->
<script src="https://unpkg.com/exifr@7.1.3in.js

<style>
    :root{
        --brand:#0b84f3;
        --ok:#1aa36f;
        --warn:#b7791f;
        --err:#d64545;
        --bg:#f7fafc;
    }
    html,body{
        margin:0; padding:0;
        font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    body{
        background:var(--bg);
        color:#111;
    }
    header{
        padding:16px;
        background:linear-gradient(90deg,var(--brand),#6bb6ff);
        color:#fff;
    }
    header h1{
        margin:0;
        font-size:18px;
    }
    main{
        max-width:680px;
        margin:16px auto 48px;
        background:#fff;
        border:1px solid #e5e7eb;
        border-radius:12px;
        padding:16px;
    }
    .row-btn{
        display:flex;gap:12px;flex-wrap:wrap;
        justify-content:center;margin:6px 0 6px;
    }
    button{
        border:none;border-radius:12px;
        padding:14px 18px;font-weight:700;cursor:pointer;
    }
    .primary{background:var(--brand);color:#fff;}
    .secondary{background:#fff;color:var(--brand);border:1px solid #cfe2ff;}
    button[disabled]{opacity:.6;cursor:not-allowed;}
    .status{text-align:center;margin-top:10px;min-height:36px;}
    .pill{display:inline-block;padding:8px 10px;border-radius:999px;font-size:13px;}
    .ok{background:#e8f7f1;color:#0c6b4e;border:1px solid #bfead9;}
    .warn{background:#fff7e6;color:#8a6100;border:1px solid #fde1a3;}
    .err{background:#fde8e8;color:#7e1f1f;border:1px solid #f3b4b4;}
    .preview{margin-top:12px;display:flex;justify-content:center;}
    .preview img{max-width:100%;border-radius:12px;border:1px solid #e5e7eb;}
    .footer{text-align:center;color:#777;font-size:12px;margin-top:16px;}
</style>
</head>

<body>
<header><h1>Upload foto (GPS opzionale)</h1></header>

<main>

    <!-- BOTTONI -->
    <div class="row-btn">
        <button id="btnShoot" class="primary">📷 Scatta foto</button>
        <button id="btnPick"  class="secondary">🖼️ Carica foto</button>
    </div>

    <!-- INPUT FILE -->
    <input id="inputCamera"  type="file" accept="image/*" capture="environment" style="display:none"/>
    <input id="inputGallery" type="file" accept="image/*" style="display:none"/>

    <div id="status"  class="status"></div>
    <div id="preview" class="preview"></div>

    <div class="footer">
        v3.0 • EXIF + GEO live • UploadCode • multipart PowerAutomate OK
    </div>
</main>

<script>
/* ==========================================================
   CONFIGURAZIONE
   ========================================================== */
const CONFIG = {

    /* ✅ URL DEL TUO TRIGGER POWER AUTOMATE (FUNZIONA) */
    FLOW_URL: "https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/9fcb17d91fb04381a99b73253c58be13/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=jKLvegzU4_lKaF9gI_bmCIZeiSu2Kl-itRJ7_ZjVFds",

    MAX_MB: 15,
    AUTO_REDIRECT_MS: 800
};

/* ==========================================================
   HELPERS
   ========================================================== */
const $ = id => document.getElementById(id);
const toMB = b => (b/1024/1024).toFixed(1);
const qs = Object.fromEntries(new URLSearchParams(location.search).entries());

function setStatus(msg,type='ok'){
    let cls = type==='ok' ? 'pill ok' : type==='err' ? 'pill err':'pill warn';
    $('status').innerHTML = `<span class="${cls}">${msg}</span>`;
}
function clearStatus(){ $('status').innerHTML=''; }
function disableUI(b){ $('btnShoot').disabled=b; $('btnPick').disabled=b; }
function showPreview(file){
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=> URL.revokeObjectURL(url);
    img.src  = url;
    $('preview').innerHTML = '';
    $('preview').appendChild(img);
}

/* ==========================================================
   GEO LIVE (fallback per scatto)
   ========================================================== */
function getLiveGeoOnce(timeoutMs=6000){
    return new Promise(resolve=>{
        if(!('geolocation' in navigator)) return resolve(null);
        let resolved=false;
        const done = v=>{ if(!resolved){ resolved=true; resolve(v);} };

        navigator.geolocation.getCurrentPosition(
            pos=>done({
                source:'geo',
                latitude:pos.coords.latitude,
                longitude:pos.coords.longitude,
                accuracy:pos.coords.accuracy ?? null,
                altitude:pos.coords.altitude ?? null,
                timestamp:pos.timestamp || Date.now()
            }),
            _=>done(null),
            {enableHighAccuracy:true,timeout:timeoutMs,maximumAge:0}
        );
        setTimeout(()=>done(null),timeoutMs+500);
    });
}

/* ==========================================================
   EXIF GPS
   ========================================================== */
async function extractGpsFromExif(file){
    try{
        const gps  = await exifr.gps(file);
        const basic = await exifr.parse(file,['DateTimeOriginal']).catch(()=>({}));
        const ts   = (basic && basic.DateTimeOriginal instanceof Date)
                        ? basic.DateTimeOriginal.toISOString()
                        : null;

        if(gps && typeof gps.latitude==='number'){
            return {
                source:'exif',
                latitude:gps.latitude,
                longitude:gps.longitude,
                altitude:gps.altitude ?? null,
                timestamp:ts
            };
        }
    }catch(_){}
    return null;
}

/* ==========================================================
   UPLOAD MULTIPART
   ========================================================== */
async function performUpload(file, position){
    const uploadCode = qs.uploadCode;
    const returnUrl  = qs.returnUrl;

    if(!uploadCode){
        setStatus("Errore: uploadCode mancante.",'err');
        return;
    }

    const metadata = {
        uploadCode: uploadCode,
        proposalId: qs.proposalId ?? null,
        position: position ?? null
    };

    const fd = new FormData();
    fd.append("file", file, file.name || "photo.jpg");
    fd.append("metadata", JSON.stringify(metadata));

    disableUI(true);
    setStatus("Caricamento…","warn");

    try{
        const res = await fetch(CONFIG.FLOW_URL,{
            method:"POST",
            body:fd
        });

        if(!res.ok){
            throw new Error(`HTTP ${res.status}`);
        }

        setStatus(position ? "Foto caricata (GPS incluso)" : "Foto caricata (senza GPS)", "ok");

        if(returnUrl){
            setTimeout(()=> location.href = returnUrl, CONFIG.AUTO_REDIRECT_MS);
        } else {
            disableUI(false);
        }

    }catch(err){
        console.error(err);
        setStatus("Errore upload: "+err.message,"err");
        disableUI(false);
    }
}

/* ==========================================================
   HANDLER FILE
   ========================================================== */
async function handleFile(file, mode){
    if(!file) return;
    if(file.size > CONFIG.MAX_MB*1024*1024){
        setStatus(`Foto > ${CONFIG.MAX_MB} MB (è ${toMB(file.size)} MB)`, "err");
        return;
    }

    clearStatus();
    showPreview(file);

    // 1) EXIF
    setStatus("Lettura coordinate EXIF…","warn");
    let pos = await extractGpsFromExif(file);

    // 2) fallback live GEO
    if(!pos && mode==="camera"){
        setStatus("Coordinate EXIF assenti, acquisizione GPS live…","warn");
        const live = await getLiveGeoOnce();
        if(live) pos = live;
    }

    await performUpload(file,pos);
}

/* ==========================================================
   EVENTI UI
   ========================================================== */
$('btnShoot').addEventListener('click',()=>{
    clearStatus();
    $('inputCamera').click();
});
$('btnPick').addEventListener('click',()=>{
    clearStatus();
    $('inputGallery').click();
});

$('inputCamera').addEventListener('change',async e=>{
    const f = e.target.files?.[0];
    await handleFile(f,'camera');
    e.target.value='';
});
$('inputGallery').addEventListener('change',async e=>{
    const f = e.target.files?.[0];
    await handleFile(f,'gallery');
    e.target.value='';
});
</script>

</body>
</html>
