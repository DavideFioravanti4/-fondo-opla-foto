<!doctype html>
<html lang="it">
<head>

  <!-- v6.2 – conversione H.264 reale + compressione + limite MB -->
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Upload foto / video</title>

  <!-- ✅ EXIF SCRIPT CORRETTO -->
  <script src="https://unpkg.com/exifrull.umd.min.js

  <!-- ✅ FFMPEG SCRIPT CORRETTO -->
  https://unpkg.com/@ffmpeg/ffmpeg@0.12.2/dist/ffmpeg.min.js</script>

  <style>
    :root{
      --brand:#0b84f3;
      --warn:#b7791f;
      --bg:#eef4ff;
    }
    html,body{
      margin:0; padding:0; font-family:system-ui;
      background:var(--bg) url("sfondo.png") no-repeat center center fixed;
      background-size:cover; color:#111;
    }
    header{
      padding:14px; background:linear-gradient(90deg,var(--brand),#6bb6ff);
      color:#fff; text-align:center; font-size:19px; font-weight:700;
    }
    main{
      width:260px; margin:12px auto; background:#fff;
      border-radius:12px; padding:6px 10px 12px;
      border:1px solid #e5e7eb; text-align:center;
    }
    .logo{
      width:260px; margin:-10px auto 10px; display:block;
    }
    .row-btn{ display:flex; flex-direction:column; gap:8px; margin-top:6px; }
    button{
      width:100%; max-width:220px; padding:10px 14px;
      border:none; border-radius:10px; cursor:pointer;
      font-size:15px; font-weight:700; color:white;
    }
    .btn-photo{ background:var(--brand); }
    .btn-video{ background:var(--warn); }
    .preview video,.preview img{
      max-width:100%; margin-top:10px; border-radius:10px;
    }
    .footer{
      margin-top:10px; font-size:11px; color:#555;
    }
  </style>

</head>

<body>

<header>Upload foto / video</header>

<main>

  <!-- ✅ LOGO PNG DEL REPOSITORY -->
  LogoUltimaVersione.pnglogo

  <div style="font-size:15px; font-weight:600; color:#444;">
    Fondo Oplà • Pagina caricata
  </div>

  <div class="row-btn">
    <button id="btnPhoto" class="btn-photo">📸 Aggiungi foto</button>
    <button id="btnVideo" class="btn-video">🎥 Aggiungi video</button>
  </div>

  <input id="inputPhoto" type="file" accept="image/*" style="display:none">
  <input id="inputVideo" type="file" accept="video/*" style="display:none">

  <div id="status"></div>
  <div id="preview" class="preview"></div>

  <div class="footer" id="version"></div>

</main>


<script>
/* ✅ Versione reale */
const VERSION = "v6.2";
document.getElementById("version").textContent = VERSION;

/* CONFIG */
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/eaecce70bbda403caa744bf8a95ddece/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4xUPro1xqrxgwZVmuyha10sbdZaPj2q7otQs2ReQpWk",
  MAX_MB:25,
  VB:"900k",
  AB:"64k"
};

const $ = id => document.getElementById(id);

function setStatus(msg){ $('status').innerHTML = msg; }

function showPreview(file){
  const url = URL.createObjectURL(file);
  $('preview').innerHTML =
    file.type.startsWith("image/")
      ? `<imgl}`
      : `<video</video>`;
}

/* ✅ FOTO */
async function handlePhoto(file){
  showPreview(file);
  setStatus("Caricamento foto…");
  await performUpload(file);
}

/* ✅ VIDEO → conversione H.264 compatibile SharePoint */
async function handleVideo(file){
  if(file.size/(1024*1024) > CONFIG.MAX_MB){
    return setStatus(`Video > ${CONFIG.MAX_MB}MB`);
  }

  setStatus("Conversione video…");

  const { createFFmpeg, fetchFile } = FFmpeg;
  const ffmpeg = createFFmpeg({ log:false });
  await ffmpeg.load();

  ffmpeg.FS("writeFile","input.mp4", await fetchFile(file));

  await ffmpeg.run(
    "-i","input.mp4",
    "-vcodec","libx264",
    "-profile:v","main",
    "-preset","veryfast",
    "-b:v",CONFIG.VB,
    "-acodec","aac",
    "-b:a",CONFIG.AB,
    "output.mp4"
  );

  const data = ffmpeg.FS("readFile","output.mp4");
  const finalFile = new File([data.buffer],"video.mp4",{type:"video/mp4"});

  showPreview(finalFile);
  setStatus("Caricamento…");
  await performUpload(finalFile);
}

/* ✅ UPLOAD */
async function performUpload(file){
  const fd=new FormData();
  fd.append("file",file,file.name);
  fd.append("metadata","{}");
  await fetch(CONFIG.FLOW_URL,{method:"POST",body:fd});
  setStatus("✅ Caricato!");
}

/* ✅ EVENTI */
$('btnPhoto').addEventListener('click',()=> $('inputPhoto').click());
$('btnVideo').addEventListener('click',()=> $('inputVideo').click());
$('inputPhoto').addEventListener('change',e=>handlePhoto(e.target.files[0]));
$('inputVideo').addEventListener('change',e=>handleVideo(e.target.files[0]));
</script>

</body>
</html>
