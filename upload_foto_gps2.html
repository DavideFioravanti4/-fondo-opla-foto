<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fondo Oplà – Caricamento Foto</title>

    <style>
        /* ------------------------------
           BACKGROUND E STILE GENERALE
           ------------------------------ */
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            background: url('sfondo.png') center/cover no-repeat fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            min-height: 100vh;
        }

        /* Overlay per migliorare la leggibilità */
        .overlay {
            background: rgba(255, 255, 255, 0.85);
            width: 95%;
            max-width: 480px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
        }

        /* ------------------------------
           LOGO
           ------------------------------ */
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-container img {
            width: 70%;
            max-width: 260px;
        }

        /* ------------------------------
           TITOLO
           ------------------------------ */
        h1 {
            text-align: center;
            color: #e54c4c;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        p {
            text-align: center;
            color: #444;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        /* ------------------------------
           CARD CARICAMENTO FOTO
           ------------------------------ */
        .upload-box {
            border: 2px dashed #f0b900;
            border-radius: 15px;
            padding: 25px;
            background: #fffdf5;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .upload-box:hover {
            border-color: #ffcc33;
            background: #fff7d9;
        }

        .upload-box input {
            display: none;
        }

        .upload-box span {
            display: block;
            margin-top: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        /* ------------------------------
           BOTTONE INVIO
           ------------------------------ */
        .btn {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #32c6b0;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s ease;
        }
        .btn:hover {
            background: #29ad99;
        }
    </style>
</head>

<body>

    <div class="overlay">

        <!-- LOGO -->
        <div class="logo-container">
            <img src="LogoUltimaVersione.png" alt="Logo Fondo Oplà">
        </div>

        <h1>Carica la tua foto</h1>
        <p>Scatta o seleziona un’immagine per completare la tua proposta.</p>

        <!-- UPLOAD CARD -->
        <label class="upload-box">
            <input type="file" accept="image/*" capture="environment" id="fotoInput">
            📸  
            <span>Tocca qui per caricare la foto</span>
        </label>

        <!-- BOTTONE SUBMIT -->
        <button class="btn" onclick="inviaFoto()">Invia Immagine</button>
    </div>

    <script>
        function inviaFoto() {
            const fileInput = document.getElementById('fotoInput');
            if (!fileInput.files.length) {
                alert("Per favore seleziona o scatta una foto prima di procedere.");
                return;
            }

            // Qui puoi aggiungere la tua logica Power Automate / API / Graph per inviare la foto
            alert("Foto caricata correttamente!");
        }
    </script>

</body>
</html>
