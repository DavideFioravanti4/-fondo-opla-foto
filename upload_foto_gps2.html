<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Upload foto • GPS opzionale</title>

<script src="https://unpkg.com/exifr/dist/exifr.min.js"></script>

<style>
    body{margin:0;padding:0;background:#f7fafc;font-family:system-ui;}
    header{padding:16px;background:linear-gradient(90deg,#0b84f3,#6bb6ff);color:#fff;text-align:center;font-weight:700;}
    main{max-width:600px;margin:20px auto;background:white;border-radius:14px;padding:20px;}
    .row-btn{display:flex;gap:14px;justify-content:center;margin-bottom:20px;}
    button{border:none;border-radius:12px;padding:14px 18px;font-weight:700;font-size:15px;cursor:pointer;}
    .primary{background:#0b84f3;color:white;}
    .secondary{background:white;color:#0b84f3;border:1px solid #cfe2ff;}
    .status{text-align:center;margin:12px 0;min-height:36px;}
    .pill{padding:8px 10px;border-radius:999px;font-weight:600;}
    .ok{background:#e8f7f1;color:#0c6b4e;}
    .warn{background:#fff7e6;color:#8a6100;}
    .err{background:#fde8e8;color:#7e1f1f;}
    .preview{text-align:center;margin-top:12px;}
    .preview img{max-width:100%;border:1px solid #e5e7eb;border-radius:14px;}
</style>
</head>

<body>

<header>Upload foto (GPS opzionale)</header>

<main>

    <div class="row-btn">
        <button id="btnShoot" class="primary">📷 Scatta foto</button>
        <button id="btnPick"  class="secondary">🖼️ Carica foto</button>
    </div>

    <input id="inputCamera"  type="file" accept="image/*" capture="environment" style="display:none"/>
    <input id="inputGallery" type="file" accept="image/*" style="display:none"/>

    <div id="status" class="status"></div>
    <div id="preview" class="preview"></div>

</main>

<script>
/* CONFIG */
const FLOW_URL = "https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/9fcb17d91fb04381a99b73253c58be13/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=jKLvegzU4_lKaF9gI_bmCIZeiSu2Kl-itRJ7_ZjVFds";
const qs = Object.fromEntries(new URLSearchParams(location.search).entries());

/* UI */
function $(id){return document.getElementById(id);}
function setStatus(msg,type){$('status').innerHTML=`<span class="pill ${type}">${msg}</span>`;}
function showPreview(file){
    const url = URL.createObjectURL(file);
    $('preview').innerHTML = `<img src="${urlon getExifGps(file){
    try{
        const gps = await exifr.gps(file);
        if(gps && gps.latitude) return { source:"exif", latitude:gps.latitude, longitude:gps.longitude };
    }catch(_){}
    return null;
}

/* GEO fallback */
function getGeo(){
    return new Promise(resolve=>{
        if(!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
            pos => resolve({ source:"geo", latitude:pos.coords.latitude, longitude:pos.coords.longitude }),
            _   => resolve(null),
            {timeout:5000}
        );
    });
}

/* UPLOAD */
async function uploadFile(file,gps){
    const uploadCode = qs.uploadCode;
    const returnUrl  = qs.returnUrl;

    if(!uploadCode){
        setStatus("Errore: manca uploadCode.","err");
        return;
    }

    const metadata = JSON.stringify({
        uploadCode: uploadCode,
        position: gps || null
    });

    const fd = new FormData();
    fd.append("file", file, file.name);
    fd.append("fileName", file.name);
    fd.append("metadata", metadata);

    setStatus("Caricamento…","warn");

    const res = await fetch(FLOW_URL,{method:"POST",body:fd});
    if(!res.ok){
        setStatus("Errore durante l'upload.","err");
        return;
    }

    setStatus("✅ Caricato correttamente","ok");

    if(returnUrl) setTimeout(()=>location.href=returnUrl,800);
}

/* EVENTI */
$('btnShoot').onclick  = ()=> $('inputCamera').click();
$('btnPick').onclick   = ()=> $('inputGallery').click();

$('inputCamera').onchange = async e=>{
    const file = e.target.files[0];
    if(!file) return;
    showPreview(file);
    let gps = await getExifGps(file) || await getGeo();
    uploadFile(file,gps);
};

$('inputGallery').onchange = async e=>{
    const file = e.target.files[0];
    if(!file) return;
    showPreview(file);
    let gps = await getExifGps(file); // niente geo su gallery
    uploadFile(file,gps);
};
</script>

</body>
</html>
