<!doctype html>
<html lang="it">
<head>

  <!-- v6.2 – conversione H.264 reale + compressione + limite MB -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Upload foto / video</title>
  <meta name="color-scheme" content="light dark"/>

  <!-- ✅ EXIF -->
  <script src="https://unpkg.com/exifr@7.1.3/dist/full.umd.min.js"></script>

  <!-- ✅ FFMPEG CORRETTO -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.2/dist/ffmpeg.min.js"></script>

  <style>
    :root{
      --brand:#0b84f3;
      --warn:#b7791f;
      --bg:#eef4ff;
    }

    html,body{
      margin:0;
      padding:0;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg) url("sfondo.png") no-repeat center center fixed;
      background-size:cover;
      color:#111;
    }

    header{
      padding:14px;
      background:linear-gradient(90deg, var(--brand), #6bb6ff);
      color:#fff;
      text-align:center;
      font-size:19px;
      font-weight:700;
    }

    main{
      width:260px;
      max-width:92%;
      margin:12px auto;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:6px 10px 12px;
      box-shadow:0 2px 12px rgba(0,0,0,.10);
      text-align:center;
    }

    .logo{
      display:block;
      margin:-10px auto 10px;
      width:260px;
      height:auto;
    }

    .intro{
      margin:0 0 10px;
      color:#444;
      font-size:15px;
      font-weight:600;
    }

    .row-btn{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      margin-top:6px;
    }

    button{
      width:100%;
      max-width:220px;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .btn-photo{ background:var(--brand); }
    .btn-video{ background:var(--warn); }

    .status{
      margin-top:8px;
      min-height:28px;
    }

    .pill{
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
      display:inline-block;
    }

    .ok{ background:#e8f7f1; color:#0c6b4e; }
    .warn{ background:#fff7e6; color:#8a6100; }
    .err{ background:#fde8e8; color:#7e1f1f; }

    .preview{
      margin-top:10px;
      display:flex;
      justify-content:center;
    }

    .preview video, .preview img{
      max-width:100%;
      border-radius:10px;
      border:1px solid #e5e7eb;
    }

    .footer{
      margin-top:10px;
      font-size:11px;
      color:#555;
      text-align:center;
    }

  </style>

</head>

<body>

<header>Upload foto / video</header>

<main>

  <!-- ✅ LOGO PNG (dal tuo repository) -->
  <img class="logo" src="LogoUltimaVersione.png" alt="Logo Oplà">

  <div class="intro">Fondo Oplà • Pagina caricata</div>

  <div class="row-btn">
    <button id="btnPhoto" class="btn-photo">📸 Aggiungi foto</button>
    <button id="btnVideo" class="btn-video">🎥 Aggiungi video</button>
  </div>

  <input id="inputPhoto" type="file" accept="image/*" style="display:none"/>
  <input id="inputVideo" type="file" accept="video/*" style="display:none"/>

  <div id="status" class="status"></div>
  <div id="preview" class="preview"></div>

  <!-- ✅ footer dinamico -->
  <div class="footer" id="version"></div>

</main>

<script>

/* ✅ Versione reale mostrata nel footer */
const VERSION = "v6.2";

/* CONFIG */
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/eaecce70bbda403caa744bf8a95ddece/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4xUPro1xqrxgwZVmuyha10sbdZaPj2q7otQs2ReQpWk",
  MAX_MB: 25,
  VB:"900k",
  AB:"64k"
};

const $ = id => document.getElementById(id);

function setStatus(msg,type='ok'){
  const c = type==='ok' ? 'pill ok' :
            type==='warn' ? 'pill warn' : 'pill err';
  $('status').innerHTML = `<span class="${c}">${msg}</span>`;
}

function disableUI(v){
  $('btnPhoto').disabled=v;
  $('btnVideo').disabled=v;
}

function showPreview(file){
  const url = URL.createObjectURL(file);
  $('preview').innerHTML = 
    file.type.startsWith("image/") 
    ? `<img src="${url}setStatus("Caricamento foto…","warn");
  await performUpload(file);
}

/* ✅ VIDEO: conversione vera H.264 */
async function handleVideo(file){
  disableUI(true);

  const MB = file.size/(1024*1024);
  if(MB > CONFIG.MAX_MB){
    setStatus(`Video sopra ${CONFIG.MAX_MB}MB`,"err");
    disableUI(false);
    return;
  }

  setStatus("Conversione video…","warn");

  const { createFFmpeg, fetchFile } = FFmpeg;
  const ffmpeg = createFFmpeg({ log:false });
  await ffmpeg.load();

  ffmpeg.FS("writeFile","input.mp4", await fetchFile(file));

  await ffmpeg.run(
    "-i","input.mp4",
    "-vcodec","libx264",
    "-profile:v","main",
    "-preset","veryfast",
    "-b:v",CONFIG.VB,
    "-acodec","aac",
    "-b:a",CONFIG.AB,
    "output.mp4"
  );

  const data = ffmpeg.FS("readFile","output.mp4");
  const finalFile = new File([data.buffer],"video.mp4",{type:"video/mp4"});

  showPreview(finalFile);
  setStatus("Caricamento…","warn");

  await performUpload(finalFile);
  disableUI(false);
}

/* ✅ Upload invariato */
async function performUpload(file){
  const fd = new FormData();
  fd.append("file", file, file.name);
  fd.append("metadata", "{}");

  const res = await fetch(CONFIG.FLOW_URL,{method:"POST",body:fd});
  setStatus(res.ok ? "✅ Caricato!" : "Errore","ok");
}

/* ✅ Eventi */
$('btnPhoto').addEventListener('click',()=> $('inputPhoto').click());
$('btnVideo').addEventListener('click',()=> $('inputVideo').click());
$('inputPhoto').addEventListener('change',e=>handlePhoto(e.target.files[0]));
$('inputVideo').addEventListener('change',e=>handleVideo(e.target.files[0]));

/* ✅ MOSTRA VERSIONE */
document.getElementById("version").textContent = VERSION;

</script>

</body>
</html>
``
