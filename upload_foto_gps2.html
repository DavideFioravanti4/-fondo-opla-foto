<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Upload foto • GPS opzionale</title>

<!-- EXIF per recupero GPS dalla foto -->
<script src="https://unpkg.com/exifr/dist/exifr.min.js"></script>

<style>
    :root{
        --brand:#0b84f3;
        --ok:#1aa36f;
        --warn:#b7791f;
        --err:#d64545;
        --bg:#f7fafc;
    }
    body{
        margin:0; padding:0;
        background:var(--bg);
        font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    header{
        padding:16px;
        background:linear-gradient(90deg,var(--brand),#6bb6ff);
        color:white;
        font-weight:700;
        text-align:center;
    }
    main{
        max-width:600px;
        margin:20px auto;
        background:white;
        padding:20px;
        border-radius:14px;
        border:1px solid #e5e7eb;
    }
    .row-btn{
        display:flex;
        gap:12px;
        justify-content:center;
        margin-bottom:20px;
    }
    button{
        border:none;
        border-radius:12px;
        padding:14px 18px;
        font-weight:700;
        cursor:pointer;
        font-size:15px;
    }
    .primary{ background:var(--brand); color:white; }
    .secondary{ background:white; color:var(--brand); border:1px solid #cfe2ff; }
    .status{ text-align:center; margin:12px 0; min-height:36px; }
    .pill{
        display:inline-block;
        padding:8px 10px;
        border-radius:999px;
        font-size:13px;
        font-weight:600;
    }
    .ok{ background:#e8f7f1; color:#0c6b4e; border:1px solid #bfead9; }
    .warn{ background:#fff7e6; color:#8a6100; border:1px solid #fde1a3; }
    .err{ background:#fde8e8; color:#7e1f1f; border:1px solid #f3b4b4; }
    .preview{
        margin-top:12px;
        text-align:center;
    }
    .preview img{
        max-width:100%;
        border-radius:14px;
        border:1px solid #e5e7eb;
    }
    footer{
        margin-top:20px;
        font-size:11px;
        text-align:center;
        color:#777;
    }
</style>
</head>

<body>

<header>Upload foto (GPS opzionale)</header>

<main>

    <div class="row-btn">
        <button id="btnShoot" class="primary">📷 Scatta foto</button>
        <button id="btnPick"  class="secondary">🖼️ Carica foto</button>
    </div>

    <input id="inputCamera"  type="file" accept="image/*" capture="environment" style="display:none"/>
    <input id="inputGallery" type="file" accept="image/*" style="display:none"/>

    <div id="status" class="status"></div>
    <div id="preview" class="preview"></div>

    <footer>v3.1 • GPS + EXIF • UploadCode • multipart compatibile Power Automate</footer>

</main>

<script>
/* CONFIG */
const CONFIG = {
    FLOW_URL: "https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/9fcb17d91fb04381a99b73253c58be13/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=jKLvegzU4_lKaF9gI_bmCIZeiSu2Kl-itRJ7_ZjVFds",
    MAX_MB: 15,
    REDIRECT_MS: 900
};

const $ = id => document.getElementById(id);
const qs = Object.fromEntries(new URLSearchParams(location.search).entries());

/* UI */
function setStatus(msg,type='ok'){
    const cls = type==='ok'?'pill ok':type==='err'?'pill err':'pill warn';
    $('status').innerHTML = `<span class="${cls}">${msg}</span>`;
}
function clearStatus(){ $('status').innerHTML=''; }
function disableUI(b){
    $('btnShoot').disabled = b;
    $('btnPick').disabled = b;
}
function showPreview(file){
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.src = url;
    img.onload = ()=> URL.revokeObjectURL(url);
    $('preview').innerHTML = '';
    $('preview').appendChild(img);
}

/* GPS LIVE */
function getLiveGeo(){
    return new Promise(resolve=>{
        if(!("geolocation" in navigator)) return resolve(null);

        navigator.geolocation.getCurrentPosition(
            pos => resolve({
                source:'geo',
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                accuracy: pos.coords.accuracy,
                altitude: pos.coords.altitude ?? null,
                timestamp: pos.timestamp || Date.now()
            }),
            _ => resolve(null),
            { enableHighAccuracy:true, timeout:6000 }
        );
    });
}

/* EXIF GPS */
async function extractExifGPS(file){
    try{
        const gps = await exifr.gps(file);
        const base = await exifr.parse(file,['DateTimeOriginal']).catch(()=> ({}));

        if(gps && typeof gps.latitude === "number"){
            return {
                source:'exif',
                latitude: gps.latitude,
                longitude: gps.longitude,
                altitude: gps.altitude ?? null,
                timestamp: base.DateTimeOriginal ? base.DateTimeOriginal.toISOString() : null
            };
        }
    }catch(_){
        return null;
    }
    return null;
}

/* UPLOAD */
async function uploadToFlow(file, gps){
    const uploadCode = qs.uploadCode;
    const returnUrl  = qs.returnUrl;

    if(!uploadCode){
        setStatus("UploadCode mancante nella querystring.","err");
        return;
    }

    const metadata = {
        uploadCode: uploadCode,
        position: gps || null
    };

    const fd = new FormData();
    fd.append("file", file, file.name || "photo.jpg");
    fd.append("metadata", JSON.stringify(metadata));

    disableUI(true);
    setStatus("Caricamento in corso…","warn");

    try{
        const res = await fetch(CONFIG.FLOW_URL, {
            method:"POST",
            body: fd
        });

        if(!res.ok){
            throw new Error("Errore HTTP: " + res.status);
        }

        setStatus("✅ Foto caricata correttamente","ok");

        if(returnUrl){
            setTimeout(()=> location.href = returnUrl, CONFIG.REDIRECT_MS);
        } else {
            disableUI(false);
        }
    }
    catch(err){
        console.error(err);
        setStatus("Errore upload: " + err.message,"err");
        disableUI(false);
    }
}

/* HANDLE FILE */
async function handleFile(file, mode){
    if(!file) return;

    if(file.size > CONFIG.MAX_MB*1024*1024){
        setStatus(`Foto troppo grande (${(file.size/1024/1024).toFixed(1)} MB)`, "err");
        return;
    }

    clearStatus();
    showPreview(file);

    setStatus("Lettura EXIF…","warn");
    let gps = await extractExifGPS(file);

    if(!gps && mode === "camera"){
        setStatus("Nessun EXIF, acquisizione GPS live…","warn");
        gps = await getLiveGeo();
    }

    uploadToFlow(file, gps);
}

/* EVENTI */
$('btnShoot').addEventListener('click',()=> $('inputCamera').click());
$('btnPick').addEventListener('click', ()=> $('inputGallery').click());

$('inputCamera').addEventListener('change', e=>{
    handleFile(e.target.files?.[0],'camera');
    e.target.value="";
});

$('inputGallery').addEventListener('change', e=>{
    handleFile(e.target.files?.[0],'gallery');
    e.target.value="";
});
</script>

</body>
</html>
