<!doctype html>

  <style>

<body>

<header>Upload foto / video</header>

<main>

  <!-- ✅ LOGO -->
  <img src="LogoUltimaVersione.png" class="logo-img"/>

  <div class="intro">Fondo Oplà • Pagina caricata</div>

  <div class="row-btn">
    <button id="btnPhoto" class="btn-photo">📸 Aggiungi foto</button>
    <button id="btnVideo" class="btn-video">🎥 Aggiungi video</button>
  </div>

  <!-- ✅ Fix Android/iOS: picker unico -->
  <input id="inputPhoto" type="file" accept="image/*" capture="environment" style="display:none"/>
  <input id="inputVideo" type="file" accept="video/*" style="display:none"/>

  <div id="status" class="status"></div>
  <div id="preview" class="preview"></div>

  <div class="footer">v5.8</div>

</main>

<script>
/* ✅ CONFIG ORIGINALE */
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/eaecce70bbda403caa744bf8a95ddece/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4xUPro1xqrxgwZVmuyha10sbdZaPj2q7otQs2ReQpWk",
  MAX_VIDEO_MB:25
};

const MAX_SECONDS = 10;
const VB = "900k";
const $ = id => document.getElementById(id);

/* ✅ STATUS */
function setStatus(msg,type='ok'){
  const c = type==='ok' ? 'pill ok' : type==='warn' ? 'pill warn' : 'pill err';
  $('status').innerHTML = `<span class="${c}">${msg}</span>`;
}

/* ✅ PREVIEW FUNZIONANTE */
function showPreview(file){
  if(!file) return;

  const url = URL.createObjectURL(file);

  if(file.type.startsWith("image/")){
    $('preview').innerHTML = `<img src="${url}" style="max-width:100%; border-radius:10px; border:1px solid #e) return;

  setStatus("Elaborazione foto…","warn");

  try{
    const exif = await exifr.parse(file).catch(()=>null);
    const imgBitmap = await createImageBitmap(file);

    let w = imgBitmap.width;
    let h = imgBitmap.height;

    let rotate = 0;
    if(exif && exif.Orientation){
      switch(exif.Orientation){
        case 6: rotate = 90; break;
        case 3: rotate = 180; break;
        case 8: rotate = -90; break;
      }
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    if(rotate === 90 || rotate === -90){
      canvas.width = h;
      canvas.height = w;
    } else {
      canvas.width = w;
      canvas.height = h;
    }

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(rotate * Math.PI/180);
    ctx.drawImage(imgBitmap, -w/2, -h/2);
    ctx.restore();

    const blob = await new Promise(res => canvas.toBlob(res,"image/jpeg",0.9));
    const finalFile = new File([blob], "foto.jpg",{type:"image/jpeg"});

    showPreview(finalFile);
    await performUpload(finalFile);
  }
  catch(err){
    console.error(err);
    setStatus("Errore nella foto","err");
  }
}


/* ✅ VIDEO (H.264 + compress + limit 10s) */
async function handleVideo(file){
  if(!file) return;

  if(file.size > CONFIG.MAX_VIDEO_MB*1024*1024){
    return setStatus("Video troppo grande","err");
  }

  setStatus("Conversione video…","warn");

  const { createFFmpeg, fetchFile } = FFmpeg;
  const ffmpeg = createFFmpeg({ log:false });
  await ffmpeg.load();

  ffmpeg.FS("writeFile","input.mp4", await fetchFile(file));

  await ffmpeg.run(
    "-i","input.mp4",
    "-t","10",
    "-vcodec","libx264",
    "-preset","veryfast",
    "-b:v", VB,
    "-acodec","aac",
    "-b:a","96k",
    "output.mp4"
  );

  const data = ffmpeg.FS("readFile","output.mp4");
  const finalFile = new File([data.buffer], "video.mp4",{type:"video/mp4"});

  showPreview(finalFile);
  await performUpload(finalFile);
}


/* ✅ UPLOAD */
async function performUpload(file){
  const fd=new FormData();
  fd.append("file",file,file.name);
  fd.append("metadata","{}");

  await fetch(CONFIG.FLOW_URL,{method:"POST",body:fd});
  setStatus("✅ Operazione completata");
}


/* ✅ EVENTI */
$('btnPhoto').addEventListener('click',()=> $('inputPhoto').click());
$('btnVideo').addEventListener('click',()=> $('inputVideo').click());
$('inputPhoto').addEventListener('change',e=>{ handlePhoto(e.target.files[0]); e.target.value=''; });
$('inputVideo').addEventListener('change',e=>{ handleVideo(e.target.files[0]); e.target.value=''; });

</script>
