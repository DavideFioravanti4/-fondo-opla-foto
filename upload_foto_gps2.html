<!doctype html>
<html lang="it">
<head>

  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <title>Upload foto / video</title>

  <style>
    :root{
      --brand:#0b84f3;
      --warn:#b7791f;
      --bg:#fad6d2; /* rosa stile Forms */
    }

    html,body{
      margin:0;
      padding:0;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:#111;
    }

    header{
      padding:14px;
      background:#ffffffcc;
      color:#111;
      text-align:center;
      font-size:19px;
      font-weight:700;
      backdrop-filter: blur(4px);
    }

    main{
      width:260px;
      max-width:92%;
      margin:14px auto;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:14px 12px 16px;
      box-shadow:0 4px 20px rgba(0,0,0,.12);
      text-align:center;
    }

    /* ✅ BOLLINO 200x200 */
    .logo-img{
      display:block;
      margin:6px auto 12px;
      width:120px;
      height:auto;
    }

    .intro{
      margin:0 0 10px;
      color:#444;
      font-size:14px;
      font-weight:600;
    }

    .row-btn{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      margin-top:6px;
    }

    button{
      width:100%;
      max-width:220px;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .btn-photo{ background:var(--brand); }
    .btn-video{ background:var(--warn); }

    .status{
      margin-top:8px;
      min-height:28px;
    }

    .pill{
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
      display:inline-block;
    }

    .ok{ background:#e8f7f1; color:#0c6b4e; border:1px solid #bfead9; }
    .warn{ background:#fff7e6; color:#8a6100; border:1px solid #fde1a3; }
    .err{ background:#fde8e8; color:#7e1f1f; border:1px solid #f3b4b4; }

    .preview{
      margin-top:10px;
      display:flex;
      justify-content:center;
    }

    .preview img,
    .preview video{
      max-width:100%;
      border-radius:10px;
      border:1px solid #e5e7eb;
    }

    .footer{
      margin-top:10px;
      font-size:11px;
      color:#555;
      text-align:center;
    }
  </style>
</head>

<body>

<header>Upload foto / video</header>

<main>

  <!-- ✅ LOGO BOLLINO – NOME FILE CORRETTO -->
  <img
    src="Fondo-Opla-bollino-200x200.jpg"
    alt="Fondo Opla"
    class="logo-img"
  />

  <div class="intro">Fondo Oplà • Pagina caricata</div>

  <div class="row-btn">
    <button id="btnPhoto" class="btn-photo">📸 Aggiungi foto</button>
    <button id="btnVideo" class="btn-video">🎥 Aggiungi video</button>
  </div>

  <input id="inputPhoto" type="file" accept="image/*" hidden />
  <input id="inputVideo" type="file" accept="video/*" hidden />

  <div id="status" class="status"></div>
  <div id="preview" class="preview"></div>

  <div class="footer">v10.2</div>

</main>

<script>
/* CONFIG */
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e7ff1401ea244fffa736f80ab9cb6962/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=1eB-ol03eLjunbDTLsHaSc8ssu2IsIOId2p6TTliWJ4",
  MAX_VIDEO_MB:300,
  MAX_VIDEO_SECONDS:20,
  AUTO_REDIRECT_MS:900
};

const $ = id => document.getElementById(id);
const qs = Object.fromEntries(new URLSearchParams(location.search).entries());

function setStatus(msg, type='ok'){
  const c = type==='ok' ? 'pill ok' : type==='err' ? 'pill err' : 'pill warn';
  $('status').innerHTML = `<span class="${c}">${msg}</span>`;
}

function showPreview(file){
  const url = URL.createObjectURL(file);
  const p = $('preview');
  p.innerHTML = '';

  if(file.type.startsWith("image/")){
    const img = new Image();
    img.onload = () => URL.revokeObjectURL(url);
    img.src = url;
    p.appendChild(img);
  } else {
    const vid = document.createElement("video");
    vid.controls = true;
    vid.src = url;
    vid.onloadeddata = () => URL.revokeObjectURL(url);
    p.appendChild(vid);
  }
}

async function performUpload(file){
  const fd = new FormData();
  const uploadCode = crypto?.randomUUID ? crypto.randomUUID() : Date.now();

  fd.append("file", file);
  fd.append("metadata", JSON.stringify({
    uploadCode,
    proposalId: qs.proposalId || null
  }));

  $('btnPhoto').disabled = true;
  $('btnVideo').disabled = true;
  setStatus("Caricamento…", "warn");

  try{
    const res = await fetch(CONFIG.FLOW_URL, {
      method:"POST",
      body:fd
    });

    if(!res.ok) throw new Error("HTTP " + res.status);

    setStatus("File caricato. Reindirizzo…","ok");

    if(qs.returnUrl){
      const key="r2eaf878955164549a839a54cf37c9ea7";
      const sep = qs.returnUrl.includes("?") ? "&" : "?";
      setTimeout(() => {
        location.href = `${qs.returnUrl}${sep}${key}=${uploadCode}`;
      }, CONFIG.AUTO_REDIRECT_MS);
    }

  } catch(err){
    setStatus("Errore: " + err.message, "err");
    $('btnPhoto').disabled = false;
    $('btnVideo').disabled = false;
  }
}

$('btnPhoto').onclick = () => $('inputPhoto').click();
$('btnVideo').onclick = () => $('inputVideo').click();

$('inputPhoto').onchange = e =>{
  if(e.target.files[0]) performUpload(e.target.files[0]);
  e.target.value='';
};

$('inputVideo').onchange = e =>{
  if(e.target.files[0]) performUpload(e.target.files[0]);
  e.target.value='';
};
</script>

</body>
</html>
