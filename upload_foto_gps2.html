<!doctype html><!doctype<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fondo Oplà – Upload Foto</title>

<!-- EXIF GPS -->
<script src="https://unpkg.com/exifr/dist/exifr.min.js"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: url('sfondo.png') center/cover no-repeat fixed;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 40px;
        min-height: 100vh;
    }
    .card {
        width: 92%;
        max-width: 450px;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 22px;
        padding: 35px 30px 45px 30px;
        text-align: center;
        box-shadow: 0 6px 28px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(5px);
    }
    .logo img {
        width: 70%;
        max-width: 260px;
        margin-bottom: 5px;
    }
    h1 {
        font-size: 1.9rem;
        color: #e55353;
        margin-bottom: 10px;
        font-weight: 700;
    }
    p {
        font-size: 1rem;
        color: #444;
        margin-top: 0;
        margin-bottom: 32px;
    }
    .btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        background: #26c3a8;
        color: #fff;
        font-size: 1.15rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.25s;
    }
    .btn:hover {
        background: #1da18c;
    }
    #fotoInput {
        display: none;
    }
    #status {
        margin-top: 12px;
        font-weight: 600;
        color: #333;
    }
</style>
</head>

<body>

<div class="card">
    <div class="logo">
        <img src="LogoUltimaVersione.png" alt="Logo Fondo Oplà">
    </div>

    <h1>Carica la tua foto</h1>
    <p>Scatta o seleziona un’immagine per completare la tua proposta.</p>

    <input type="file" accept="image/*" capture="environment" id="fotoInput">

    <button class="btn" onclick="caricaFoto()">Aggiungi foto</button>

    <div id="status"></div>
</div>


<script>
/* ============================================================
   CONFIG — il tuo flusso PowerAutomate
============================================================ */
const FLOW_URL =
  "https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/9fcb17d91fb04381a99b73253c58be13/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=jKLvegzU4_lKaF9gI_bmCIZeiSu2Kl-itRJ7_ZjVFds";

const params     = new URLSearchParams(window.location.search);
const returnUrl  = params.get("returnUrl");
const proposalId = params.get("proposalId") || null;


/* ============================================================
   GPS EXIF
============================================================ */
async function getExifGps(file){
    try{
        const gps = await exifr.gps(file);
        if (gps && gps.latitude && gps.longitude){
            return {
                latitude:  gps.latitude,
                longitude: gps.longitude,
                altitude:  gps.altitude ?? null,
                timestamp: null
            };
        }
    }catch(_){}
    return null;
}


/* ============================================================
   GPS fallback (geolocalizzazione live)
============================================================ */
function getLiveGps(){
    return new Promise(resolve=>{
        if(!navigator.geolocation) return resolve(null);

        navigator.geolocation.getCurrentPosition(
            pos => resolve({
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                altitude: pos.coords.altitude ?? null,
                timestamp: Date.now()
            }),
            _   => resolve(null),
            {enableHighAccuracy:true,timeout:6000}
        );
    });
}


/* ============================================================
   Upload
============================================================ */
async function uploadToFlow(file, position){
    const uploadCode = crypto.randomUUID();

    const metadata = {
        uploadCode: uploadCode,
        proposalId: proposalId,
        position: position
    };

    const fd = new FormData();
    fd.append("file", file, file.name);
    fd.append("fileName", file.name);
    fd.append("metadata", JSON.stringify(metadata));

    document.getElementById("status").innerHTML = "Caricamento…";

    const res = await fetch(FLOW_URL, { method:"POST", body:fd });

    if(!res.ok){
        document.getElementById("status").innerHTML = "Errore nell'invio.";
        return;
    }

    document.getElementById("status").innerHTML = "✅ Foto caricata";

    if(returnUrl){
        setTimeout(()=>{ window.location.href = returnUrl; }, 800);
    }
}


/* ============================================================
   MAIN HANDLER
============================================================ */
function caricaFoto(){
    const fileInput = document.getElementById("fotoInput");
    fileInput.click();

    fileInput.onchange = async function(){
        if(!fileInput.files.length) return;

        const file = fileInput.files[0];

        // GPS da EXIF
        let gps = await getExifGps(file);

        // fallback GEO
        if(!gps){
            gps = await getLiveGps();
        }

        await uploadToFlow(file, gps);
    };
}
</script>

</body>
</html>
