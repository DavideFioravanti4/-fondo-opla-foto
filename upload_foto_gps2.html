<!DOCTYPE html>
<html lang="it">
<headUTF-8" /><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fondo Oplà – Upload Foto</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: url('sfondo.png') center/cover no-repeat fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            min-height: 100vh;
        }

        .card {
            width: 92%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 22px;
            padding: 35px 30px 45px 30px;
            text-align: center;
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(5px);
        }

        .logo img {
            width: 70%;
            max-width: 260px;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 1.9rem;
            color: #e55353;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            color: #444;
            margin-top: 0;
            margin-bottom: 32px;
        }

        /* Input nascosto */
        #fotoInput {
            display: none;
        }

        /* Tasto verde */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #26c3a8;
            color: #fff;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn:hover {
            background: #1da18c;
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- LOGO -->
        <div class="logo">
            <img src="LogoUltimaVersione.png" alt="Logo Fondo Oplà">
        </div>

        <h1>Carica la tua foto</h1>
        <p>Scatta o seleziona un’immagine per completare la tua proposta.</p>

        <!-- INPUT FILE NASCOSTO -->
        <input type="file" accept="image/*" capture="environment" id="fotoInput">

        <!-- TASTO VERDE UNICO -->
        <button class="btn" onclick="caricaFoto()">Aggiungi foto</button>

    </div>

    <script>
        function caricaFoto() {
            const fileInput = document.getElementById('fotoInput');

            // Apri selettore file / fotocamera
            fileInput.click();

            fileInput.onchange = function () {
                if (!fileInput.files.length) return;

                alert("Foto caricata correttamente!");

                // Redirect al returnUrl
                const params = new URLSearchParams(window.location.search);
                const returnUrl = params.get('returnUrl');
                if (returnUrl) window.location.href = returnUrl;
            }
        }
    </script>

</body>
</html>
