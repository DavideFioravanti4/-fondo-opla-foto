<!doctype html>
<html lang="it">
<head>

  <!-- v4.8 – logo gigante + riquadro compatto + foto+video -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Upload foto / video (GPS opzionale)</title>
  <meta name="color-scheme" content="light dark"/>

  <!-- EXIF -->
  <script src="https://unpkg.com/exifr@7.1.3/dist/full.umd.min.js"></script>

  <style>
    :root{
      --brand:#0b84f3;
      --warn:#b7791f;
      --bg:#eef4ff;
    }

    html,body{
      margin:0;
      padding:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg) url("sfondo.png") no-repeat center center fixed;
      background-size:cover;
      color:#111;
    }

    header{
      padding:20px;
      background:linear-gradient(90deg, var(--brand), #6bb6ff);
      color:#fff;
      text-align:center;
      font-size:22px;
      font-weight:700;
    }

    main{
      width:420px;
      max-width:90%;
      margin:32px auto;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:24px;
      box-shadow:0 4px 20px rgba(0,0,0,.12);
      text-align:center;
    }

    /* ✅ LOGO GIGANTE E CENTRATO */
    .logo{
      display:block;
      margin:0 auto 24px;
      width:300px;    /* ← LOGO MOLTO GRANDE */
      height:auto;
    }

    .intro{
      margin:0 0 20px;
      color:#444;
      font-size:20px;
      font-weight:600;
    }

    /* ✅ PULSANTI IN COLONNA (UNO SOTTO L'ALTRO) */
    .row-btn{
      display:flex;
      flex-direction:column;   /* ← COLONNA */
      align-items:center;
      gap:14px;
      margin-top:14px;
    }

    button{
      width:100%;                /* ← LARGHEZZA INTERA */
      max-width:300px;
      border:none;
      border-radius:12px;
      padding:14px 22px;
      font-weight:700;
      cursor:pointer;
      font-size:16px;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
    }

    .btn-photo{ background:var(--brand); }
    .btn-video{ background:var(--warn); }

    .status{
      margin-top:18px;
      min-height:40px;
    }

    .pill{
      padding:8px 12px;
      border-radius:999px;
      font-size:14px;
      font-weight:600;
      display:inline-block;
    }

    .ok{ background:#e8f7f1; color:#0c6b4e; border:1px solid #bfead9; }
    .warn{ background:#fff7e6; color:#8a6100; border:1px solid #fde1a3; }
    .err{ background:#fde8e8; color:#7e1f1f; border:1px solid #f3b4b4; }

    .preview{
      margin-top:16px;
      display:flex;
      justify-content:center;
    }

    .preview img, .preview video{
      max-width:100%;
      border-radius:12px;
      border:1px solid #e5e7eb;
    }

    .footer{
      margin-top:24px;
      font-size:12px;
      color:#555;
      text-align:center;
    }
  </style>
</head>

<body>

<header>Upload foto / video (GPS opzionale)</header>

<main>

  <!-- ✅ LOGO GIGANTE (IMMAGINE) -->
  <img src="LogoUltimaVersione.png" class="logo">

  <div class="intro">Fondo Oplà • Pagina caricata</div>

  <!-- ✅ PULSANTI IN COLONNA -->
  <div class="row-btn">
    <button id="btnPhoto" class="btn-photo">📸 Aggiungi foto</button>
    <button id="btnVideo" class="btn-video">🎥 Aggiungi video</button>
  </div>

  <!-- Picker -->
  <input id="inputPhoto" type="file" accept="image/*" style="display:none"/>
  <input id="inputVideo" type="file" accept="video/*" style="display:none"/>

  <div id="status" class="status"></div>
  <div id="preview" class="preview"></div>

  <div class="footer">v4.8</div>

</main>


<script>
/* CONFIG */
const CONFIG = {
  FLOW_URL:"https://defaultb87cc26609c440cc8dfac92e08bf9c.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/eaecce70bbda403caa744bf8a95ddece/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4xUPro1xqrxgwZVmuyha10sbdZaPj2q7otQs2ReQpWk",
  TARGET_MAX_BYTES:1*1024*1024,
  TARGET_MAX_DIM:1600,
  MAX_VIDEO_MB:15,
  AUTO_REDIRECT_MS:900
};

const $ = id => document.getElementById(id);
const qs = Object.fromEntries(new URLSearchParams(location.search).entries());

function setStatus(msg,type='ok'){
  const c = type==='ok'?'pill ok':type==='err'?'pill err':'pill warn';
  $('status').innerHTML = `<span class="${c}">${msg}</span>`;
}

/* Anteprima */
function showPreview(file){
  const url = URL.createObjectURL(file);
  const p = $('preview');
  p.innerHTML='';
  if(file.type.startsWith("image/")){
    const img=new Image();
    img.onload=()=>URL.revokeObjectURL(url);
    img.src=url;
    p.appendChild(img);
  } else {
    const vid=document.createElement("video");
    vid.src=url; vid.controls=true;
    vid.onloadeddata=()=>URL.revokeObjectURL(url);
    p.appendChild(vid);
  }
}

/* Compress foto */
async function downscaleToJPEG(file){
  try{
    const bmp=await createImageBitmap(file);
    const scale=Math.min(1,CONFIG.TARGET_MAX_DIM/Math.max(bmp.width,bmp.height));
    const w=Math.round(bmp.width*scale);
    const h=Math.round(bmp.height*scale);

    const canvas=document.createElement("canvas");
    canvas.width=w; canvas.height=h;
    canvas.getContext("2d").drawImage(bmp,0,0,w,h);

    let q=0.8;
    let blob=await new Promise(r=>canvas.toBlob(r,"image/jpeg",q));
    while(blob.size>CONFIG.TARGET_MAX_BYTES&&q>0.4){
      q-=0.1;
      blob=await new Promise(r=>canvas.toBlob(r,"image/jpeg",q));
    }

    return new File([blob],"photo.jpg",{type:"image/jpeg"});
  }catch(e){
    return file;
  }
}

/* GPS */
async function extractGps(file){
  try{
    const gps=await exifr.gps(file);
    if(gps?.latitude&&gps?.longitude) return gps;
  }catch(e){}
  return null;
}

/* Upload */
async function performUpload(file,position,noGps){
  const fd=new FormData();
  fd.append("file",file,file.name);

  const uploadCode=crypto?.randomUUID?crypto.randomUUID():Date.now();

  fd.append("metadata",JSON.stringify({
    uploadCode,
    proposalId:qs.proposalId||null,
    position,
    notes:noGps?"gps non disponibile":undefined
  }));

  $('btnPhoto').disabled=true;
  $('btnVideo').disabled=true;
  setStatus("Caricamento…","warn");

  try{
    const res=await fetch(CONFIG.FLOW_URL,{method:"POST",body:fd});
    if(!res.ok) throw new Error("HTTP "+res.status);

    setStatus("File caricato. Reindirizzo…","ok");

    if(qs.returnUrl){
      const key="r2eaf878955164549a839a54cf37c9ea7";
      const sep=qs.returnUrl.includes("?")?"&":"?";
      setTimeout(()=>location.href=
        `${qs.returnUrl}${sep}${key}=${uploadCode}`,
      CONFIG.AUTO_REDIRECT_MS);
    }

  }catch(err){
    setStatus("Errore: "+err.message,"err");
    $('btnPhoto').disabled=false;
    $('btnVideo').disabled=false;
  }
}

/* Foto */
async function handlePhoto(file){
  if(!file) return;
  showPreview(file);
  setStatus("Verifico GPS…","warn");
  const gps=await extractGps(file);
  const slim=await downscaleToJPEG(file);
  await performUpload(slim,gps,!gps);
}

/* Video */
async function handleVideo(file){
  if(!file) return;
  if(file.size > CONFIG.MAX_VIDEO_MB*1024*1024)
    return setStatus(`Video troppo grande (>${CONFIG.MAX_VIDEO_MB}MB)`,"err");
  showPreview(file);
  await performUpload(file,null,false);
}

/* Eventi */
$('btnPhoto').addEventListener('click',()=> $('inputPhoto').click());
$('btnVideo').addEventListener('click',()=> $('inputVideo').click());

$('inputPhoto').addEventListener('change',e=>{
  handlePhoto(e.target.files?.[0]);
  e.target.value='';
});

$('inputVideo').addEventListener('change',e=>{
  handleVideo(e.target.files?.[0]);
  e.target.value='';
});
</script>

</body>
</html>
